<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Parallax Hero - MSIT</title>

    <!-- Sleek font for Apple-style typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- GSAP Core & ScrollTrigger (latest) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        :root {
            --ease: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505; /* Deep rich black */
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 1. Layout & Stacking */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 
           Image layers are given slightly larger height (e.g. 130%) 
           so that when they move up (y: -30%), we don't expose 
           the bottom edge of the image and create an empty space.
        */
        .layer {
            position: absolute;
            left: -5%;
            width: 110%; /* Slight horizontal bleed */
            object-fit: cover;
            object-position: bottom center;
            will-change: transform;
        }

        .layer-bg {
            z-index: 1;
            top: 0;
            height: 100%;
        }

        .layer-mid {
            z-index: 2;
            top: 0;
            height: 115%;
        }

        .layer-fg {
            z-index: 3;
            top: 0;
            height: 140%;
        }

        /* Dark UI overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            /* Subtle black gradient fading up from bottom, dark at top for header readability */
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        /* UI Container */
        .ui-container {
            position: relative;
            z-index: 5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 0 1.5rem;
        }

        .ui-container h1 {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            text-shadow: 0 10px 40px rgba(0,0,0,0.8);
            margin: 0;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.125rem 2.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            text-decoration: none;
            transition: all 0.4s var(--ease);
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .cta-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.15);
        }

        /* Spacer to allow scrolling past the hero */
        .content {
            position: relative;
            z-index: 10;
            padding: 6rem 2rem;
            background-color: #050505;
            min-height: 150vh;
            text-align: center;
        }

        .content h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }
        
        .content p {
            font-size: 1.125rem;
            line-height: 1.6;
            color: #888;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- Cinematic Parallax Hero Section -->
    <section class="hero" id="hero">
        <!-- Parallax Layers -->
        <img src="./assets/background.png" alt="Background" class="layer layer-bg" id="parallax-bg">
        <img src="./assets/midground.png" alt="Midground" class="layer layer-mid" id="parallax-mid">
        <img src="./assets/foreground.png" alt="Foreground" class="layer layer-fg" id="parallax-fg">
        
        <!-- Dark Overlay -->
        <div class="overlay"></div>

        <!-- Foreground UI Text and Button -->
        <div class="ui-container" id="ui-container">
            <h1>Innovate <br /> The Future</h1>
            <a href="#explore" class="cta-btn">Explore Campus</a>
        </div>
    </section>

    <!-- Content Section -->
    <section class="content" id="explore">
        <h2>Continuing The Journey</h2>
        <p>Scroll up and down to see the cinematic 3D parallax effect in action. The layers move at precisely tuned different rates to create a hyper-realistic sense of depth.</p>
    </section>

    <script>
        // 2. Parallax Animation Logic
        document.addEventListener("DOMContentLoaded", () => {
            gsap.registerPlugin(ScrollTrigger);

            // Create a GSAP Timeline tied to the scroll position of the hero section
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "#hero",
                    start: "top top",     // Animation begins when upper edge of hero hits upper edge of viewport
                    end: "bottom top",    // Animation ends when bottom edge of hero hits upper edge of viewport
                    scrub: 1,             // Add a 1-second delay catch-up for a smoother 'cinematic' ease
                }
            });

            // Background Layer: Barely moves and scales up slightly to create subtle depth
            tl.to("#parallax-bg", {
                y: "5%",         // Moves slightly opposite the scroll direction
                scale: 1.05,
                ease: "none"
            }, 0);

            // Midground Layer: Moves up on the Y-axis at medium speed
            tl.to("#parallax-mid", {
                y: "-15%",
                ease: "none"
            }, 0);

            // Foreground Layer: Moves up on the Y-axis extremely quickly
            tl.to("#parallax-fg", {
                y: "-30%",
                ease: "none"
            }, 0);

            // UI Container: Fades out and translates physically up
            tl.to("#ui-container", {
                y: "-70%",
                opacity: 0,
                ease: "power1.inOut" // Looks better with a slight ease instead of linear
            }, 0);
        });
    </script>
</body>
</html>
