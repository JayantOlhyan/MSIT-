<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - MSIT</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        h1 { font-size: 48px; margin: 0; color: #ef4444; }
        p { font-size: 18px; color: #475569; margin: 20px 0 30px; }
        .btn {
            display: inline-block;
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .support { margin-top: 30px; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>500</h1>
        <h2>Internal Server Error</h2>
        <p>Something went wrong on our end. We're working to fix it as quickly as possible.</p>
        <a href="/" class="btn">Return to Campus</a>
        <div class="support">
            Need immediate help? Contact support@msit.in
        </div>
    </div>
</body>
</html>
